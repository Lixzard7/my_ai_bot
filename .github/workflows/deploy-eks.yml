name: Deploy to AWS EKS

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      EKS_KUBECTL_ROLE_ARN: ${{ secrets.EKS_KUBECTL_ROLE_ARN }}


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -e
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing secret: AWS_REGION"
            exit 1
          fi
          if [ -z "${ECR_REPOSITORY}" ]; then
            echo "Missing secret: ECR_REPOSITORY"
            exit 1
          fi
          if [ -z "${CLUSTER_NAME}" ]; then
            echo "Missing secret: CLUSTER_NAME"
            exit 1
          fi
          if [ -z "${AWS_ACCESS_KEY_ID}" ]; then
            echo "Missing secret: AWS_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "Missing secret: AWS_SECRET_ACCESS_KEY"
            exit 1
          fi

      - name: Configure AWS credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: |
          if [ -n "$EKS_KUBECTL_ROLE_ARN" ]; then
            if aws sts assume-role --role-arn "$EKS_KUBECTL_ROLE_ARN" --role-session-name "gha-eks-check" --duration-seconds 900 >/dev/null 2>&1; then
              aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION" --role-arn "$EKS_KUBECTL_ROLE_ARN"
            else
              echo "Could not assume EKS_KUBECTL_ROLE_ARN. Falling back to base AWS identity."
              aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
            fi
          else
            aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
          fi

      - name: Debug caller identity
        run: |
          echo "AWS identity used by workflow:"
          aws sts get-caller-identity
          echo "EKS_KUBECTL_ROLE_ARN=${EKS_KUBECTL_ROLE_ARN:-<empty>}"

      - name: Verify cluster access
        run: |
          NAMESPACE="default"
          if [ -n "$EKS_KUBECTL_ROLE_ARN" ]; then
            if aws sts assume-role --role-arn "$EKS_KUBECTL_ROLE_ARN" --role-session-name "gha-eks-token-check" --duration-seconds 900 >/dev/null 2>&1; then
              aws eks get-token --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION" --role-arn "$EKS_KUBECTL_ROLE_ARN" >/dev/null
            else
              echo "Could not assume EKS_KUBECTL_ROLE_ARN. Continuing with base AWS identity token."
              aws eks get-token --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION" >/dev/null
            fi
          else
            aws eks get-token --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION" >/dev/null
          fi
          kubectl auth can-i get pods -n "$NAMESPACE" || {
            echo "Authenticated to AWS, but not authorized in EKS Kubernetes RBAC."
            echo "Grant the exact principal from 'Debug caller identity' EKS access entry or aws-auth mapping."
            echo "If you want to use EKS_KUBECTL_ROLE_ARN, allow sts:AssumeRole to that role for the access key principal."
            exit 1
          }

      - name: Deploy to EKS
        run: |
          NAMESPACE="default"
          kubectl apply -f deployment.yaml -n "$NAMESPACE"
          kubectl apply -f servicefile.yaml -n "$NAMESPACE"
          kubectl set image deployment/chatbot chatbot="$IMAGE_URI" -n "$NAMESPACE"
          kubectl rollout status deployment/chatbot -n "$NAMESPACE" --timeout=300s
