name: Deploy to AWS EKS

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      EKS_KUBECTL_ROLE_ARN: ${{ secrets.EKS_KUBECTL_ROLE_ARN }}


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -e
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing secret: AWS_REGION"
            exit 1
          fi
          if [ -z "${ECR_REPOSITORY}" ]; then
            echo "Missing secret: ECR_REPOSITORY"
            exit 1
          fi
          if [ -z "${CLUSTER_NAME}" ]; then
            echo "Missing secret: CLUSTER_NAME"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Key)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure AWS auth method configured
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && (env.AWS_ACCESS_KEY_ID == '' || env.AWS_SECRET_ACCESS_KEY == '') }}
        run: |
          echo "Set either AWS_ROLE_TO_ASSUME (OIDC) or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
          exit 1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: |
          if [ -n "$EKS_KUBECTL_ROLE_ARN" ]; then
            aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION" --role-arn "$EKS_KUBECTL_ROLE_ARN"
          else
            aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
          fi

      - name: Debug caller identity
        run: |
          echo "AWS identity used by workflow:"
          aws sts get-caller-identity
          echo "EKS_KUBECTL_ROLE_ARN=${EKS_KUBECTL_ROLE_ARN:-<empty>}"

      - name: Verify cluster access
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          if [ -n "$EKS_KUBECTL_ROLE_ARN" ]; then
            aws eks get-token --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION" --role-arn "$EKS_KUBECTL_ROLE_ARN" >/dev/null
          else
            aws eks get-token --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION" >/dev/null
          fi
          kubectl auth can-i get pods -n "$NAMESPACE" || {
            echo "Authenticated to AWS, but not authorized in EKS Kubernetes RBAC."
            echo "Grant the exact principal from 'Debug caller identity' EKS access entry or aws-auth mapping."
            exit 1
          }

      - name: Deploy to EKS
        run: |
          NAMESPACE="${K8S_NAMESPACE:-default}"
          kubectl apply -f deployment.yaml -n "$NAMESPACE"
          kubectl apply -f servicefile.yaml -n "$NAMESPACE"
          kubectl set image deployment/chatbot chatbot="$IMAGE_URI" -n "$NAMESPACE"
          kubectl rollout status deployment/chatbot -n "$NAMESPACE" --timeout=180s