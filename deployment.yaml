apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:

      containers:
      - name: chatbot
        image: 292600391924.dkr.ecr.ap-south-1.amazonaws.com/sarthakbotecr:latest
        ports:
        - containerPort: 8000
        env:
         - name: GEMINI_API_KEY
           valueFrom:
             secretKeyRef:
               name: gemini-secret
               key: GEMINI_API_KEY      